# ============================================================
# Placement System — application.properties
# ============================================================

server.port=8080

# ── DATABASE ── Apna MySQL password yahan daalo ──────────────
spring.datasource.url=jdbc:mysql://localhost:3306/placement_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=PlacementSystemSecretKey2024VeryLongSecretKeyForJWTTokenGenerationMinimum512Bits
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ✅ FIX 10: Mail auto-config disable — warna startup fail hoga
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# CORS
app.cors.allowed-origins=http://localhost:3000

# ✅ FIX 11: Logging — login errors clearly dikhenge console mein
logging.level.com.placement=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=ERROR
